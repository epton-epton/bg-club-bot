services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bgclub
      POSTGRES_PASSWORD: bgclub
      POSTGRES_DB: bgclub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgclub -d bgclub"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bgclub:bgclub@postgres:5432/bgclub
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build: .
    command: python scripts/seed_dev.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bgclub:bgclub@postgres:5432/bgclub
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    build: .
    command: uvicorn bgclub_api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bgclub:bgclub@postgres:5432/bgclub
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./shared:/app/shared
      - ./api:/app/api
      - ./bot:/app/bot
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./data/uploads:/app/data/uploads
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  bot:
    build: .
    command: python -m bgclub_bot.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bgclub:bgclub@postgres:5432/bgclub
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./shared:/app/shared
      - ./api:/app/api
      - ./bot:/app/bot
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  miniapp:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./miniapp:/app
      - miniapp_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  miniapp_node_modules:
