# Продакшен: docker compose -f docker-compose.prod.yml up -d --build
# См. docs/deploy.md

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bgclub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-bgclub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgclub -d bgclub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bgclub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bgclub}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    restart: unless-stopped
    command: sh scripts/start_api_prod.sh
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bgclub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bgclub}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    command: python -m bgclub_bot.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bgclub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bgclub}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  miniapp:
    build:
      context: ./miniapp
      dockerfile: Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - miniapp

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
